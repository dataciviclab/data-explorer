name: Bug — Explorer
description: Segnala un problema sul data-explorer (pagina non funzionante, dati errati, errore grafico)
labels: [bug]
body:
  - type: textarea
    id: desc
    attributes:
      label: Descrizione
      description: Cosa non funziona?
    validations:
      required: true
  - type: input
    id: url
    attributes:
      label: URL della pagina
      description: Link alla pagina dove vedi il problema
  - type: textarea
    id: expected
    attributes:
      label: Comportamento atteso
      description: Cosa ti aspettavi?
