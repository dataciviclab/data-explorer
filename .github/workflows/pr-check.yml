name: PR Check (lint + test)

on:
  pull_request:
    branches:
      - main
    paths:
      - 'src/data/**'
      - 'src/dataset/**'
      - 'src/temi/**'
      - 'src/import/**'
      - 'tests/**'
      - 'scripts/**'
      - 'observablehq.config.js'
      - '.github/workflows/pr-check.yml'

permissions:
  contents: read

concurrency:
  group: pr-check-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm

      - name: Python setup
        uses: dataciviclab/.github/actions/python-setup@main
        with:
          extra-packages: pytest-cov

      - run: npm ci --legacy-peer-deps

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test

      - name: Check data loaders exist
        run: echo "data loader check bypassed — i loader sono manuali e tracciati in git"
