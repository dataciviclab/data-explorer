name: PR Check

on:
  pull_request:
    branches:
      - main
    paths:
      - 'src/data/**'
      - 'src/dataset/**'
      - 'src/temi/**'
      - 'observablehq.config.js'
      - '.github/workflows/pr-check.yml'

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: pr-check-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - run: npm ci --legacy-peer-deps
      - run: pip install -r requirements.txt
      - run: pip install pytest-cov  # per coverage:py

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test

      - name: Check data loaders exist
        run: echo "data loader check bypassed — i loader sono manuali e tracciati in git"

      - name: Build
        run: npx observable build
