name: PR Check

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: pr-check-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - run: npm ci --legacy-peer-deps
      - run: pip install -r requirements.txt
      - run: pip install pytest-cov  # per coverage:py

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test

      - name: Generate pages from remote catalog
        run: npm run generate:observable

      - name: Build
        run: npx observable build
