name: Deploy to GitHub Pages (Observable Framework)

on:
  push:
    branches:
      - main
  repository_dispatch:
    types: [catalog_updated]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm

      - uses: actions/configure-pages@v6
        id: pages

      - name: Install Node dependencies
        run: npm ci --legacy-peer-deps

      - name: Install Python dependencies
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt

      - name: Generate pages from remote catalog
        run: npm run generate:observable

      - name: Build Observable Framework
        run: npx observable build

      - name: Copy CNAME for custom domain
        run: cp static/CNAME dist/observable/

      - uses: actions/upload-pages-artifact@v5
        with:
          path: dist/observable

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
